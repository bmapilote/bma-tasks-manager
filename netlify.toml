#
# NEXT_PUBLIC_SUPABASE_URL
#   Your Supabase project URL.
#   https://okxlsimomewvtfwsgirn.supabase.co
#
# NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY
#   Your Supabase anon/publishable key.
